name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release And Publish NuGet
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore TelegramGatewayNet.sln

      - name: Build
        run: dotnet build TelegramGatewayNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TelegramGatewayNet.sln --configuration Release --no-build --verbosity normal

      - name: Pack Package
        run: dotnet pack src/TelegramGatewayNet/TelegramGatewayNet.csproj --configuration Release --no-build --output artifacts/packages

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          args=(
            artifacts/packages/*
            --title "TelegramGatewayNet ${TAG_NAME#v}"
            --generate-notes
            --verify-tag
          )

          if [[ "$TAG_NAME" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "$TAG_NAME" "${args[@]}"

      - name: Publish NuGet Packages
        if: env.NUGET_API_KEY != ''
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Publish NuGet Symbols
        if: env.NUGET_API_KEY != ''
        run: |
          for package in artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

      - name: Skip NuGet Publish
        if: env.NUGET_API_KEY == ''
        run: echo "NUGET_API_KEY is not configured; GitHub Release artifacts were created but packages were not published to NuGet.org."
